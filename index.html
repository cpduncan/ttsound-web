<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ttsound web (barebones)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 1rem;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="./src/assets/icon.svg" />
  </head>
  <body>
    <h1>ttsound-web</h1>

    <input id="file" type="file" accept="audio/*" multiple />
    <button id="play">Play</button>
    <button id="stop">Stop</button>
    <button id="export">Export WAV</button>

    <div id="tracks"></div>

    <script type="module" src="./src/ui/index.ts"></script>
  </body>
</html>
